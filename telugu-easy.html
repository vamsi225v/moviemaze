function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

shuffle(allQuestions);

const quiz = allQuestions.slice(0,15);

let currentQuestion = 0;
let score = 0;
let answered = false;

function loadQuestion(){

answered = false;

document.getElementById("result").innerHTML = "";
document.getElementById("nextBtn").style.display = "none";

document.getElementById("progress").innerHTML =
`Question ${currentQuestion+1} of ${quiz.length}`;

document.getElementById("scoreDisplay").innerHTML =
`Score: ${score}`;

const q = quiz[currentQuestion];

document.getElementById("question").innerHTML = q.question;

let html = "";

q.options.forEach(option => {

html += `
<button class="option"
onclick="checkAnswer(this,'${option}')">
${option}
</button>
`;

});

document.getElementById("options").innerHTML = html;

}

function checkAnswer(button,selected){

if(answered) return;

answered = true;

let correct = quiz[currentQuestion].answer;

let buttons = document.querySelectorAll(".option");

buttons.forEach(btn => {

btn.disabled = true;

if(btn.innerText === correct){
btn.classList.add("correct");
}

});

if(selected === correct){

score++;

document.getElementById("result").innerHTML =
"✅ Correct!";

}else{

button.classList.add("wrong");

document.getElementById("result").innerHTML =
"❌ Wrong! Correct answer: " + correct;

}

document.getElementById("scoreDisplay").innerHTML =
`Score: ${score}`;

document.getElementById("nextBtn").style.display =
"inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){

loadQuestion();

}else{

let badge = "🍿 New Viewer";

if(score >= 6) badge = "🎬 Movie Fan";
if(score >= 10) badge = "🌟 Movie Buff";
if(score >= 13) badge = "🏆 Telugu Legend";

let accuracy =
Math.round((score/quiz.length)*100);

if(score >= 10){

document.querySelector(".container").innerHTML = `
<h1>🎉 Telugu Easy Completed</h1>

<h2>Score: ${score}/${quiz.length}</h2>

<h3>${badge}</h3>

<p>Accuracy: ${accuracy}%</p>

<p style="color:lightgreen;font-size:22px;font-weight:bold;">
✅ Congratulations!
</p>

<p>
You are eligible for Medium Level
</p>
