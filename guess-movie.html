<!DOCTYPE html>
<html>
<head>
<title>MovieMaze Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#222;
padding:30px;
border-radius:12px;
}

.option{
display:block;
width:100%;
padding:12px;
margin:10px 0;
background:#333;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#444;
}

#nextBtn{
display:none;
margin-top:15px;
padding:10px 20px;
background:#ffc107;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 MovieMaze</h1>

<h3 id="progress"></h3>
<h2 id="question"></h2>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">Next Question</button>

</div>

<script>

const quiz = [
{
question:"Which movie features Jack and Rose?",
options:["Avatar","Titanic","Inception","Gladiator"],
answer:"Titanic"
},
{
question:"Who played Iron Man?",
options:["Chris Evans","Tom Holland","Robert Downey Jr.","Chris Hemsworth"],
answer:"Robert Downey Jr."
},
{
question:"Which movie has Rancho as a character?",
options:["PK","Dangal","3 Idiots","Ghajini"],
answer:"3 Idiots"
},
{
question:"Who played Pushpa Raj?",
options:["Nani","Ram Charan","Allu Arjun","Prabhas"],
answer:"Allu Arjun"
},
{
question:"Which movie stars Amarendra Baahubali?",
options:["RRR","Salaar","Pushpa","Baahubali"],
answer:"Baahubali"
}
];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

document.getElementById("progress").innerHTML =
`Question ${currentQuestion + 1} of ${quiz.length}`;

document.getElementById("result").innerHTML = "";

document.getElementById("nextBtn").style.display = "none";

let q = quiz[currentQuestion];

document.getElementById("question").innerHTML = q.question;

let html = "";

q.options.forEach(option => {
html += `
<button class="option" onclick="checkAnswer('${option}')">
${option}
</button>
`;
});

document.getElementById("options").innerHTML = html;
}

function checkAnswer(selected){

if(selected === quiz[currentQuestion].answer){
score++;
document.getElementById("result").innerHTML = "✅ Correct!";
}
else{
document.getElementById("result").innerHTML =
"❌ Wrong! Correct answer: " + quiz[currentQuestion].answer;
}

document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){
loadQuestion();
}
else{

document.querySelector(".container").innerHTML = `
<h1>🎉 Quiz Completed</h1>
<h2>Your Score: ${score}/${quiz.length}</h2>
<button onclick="location.reload()">Play Again</button>
`;

}
}

loadQuestion();

</script>

</body>
</html>
