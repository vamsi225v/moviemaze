<!DOCTYPE html>
<html>
<head>
<title>Easy V2 Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#222;
    padding:30px;
    border-radius:12px;
}

.option{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.correct{
    background:green !important;
}

.wrong{
    background:red !important;
}

#nextBtn{
    display:none;
    background:#ffc107;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🟢 Telugu Easy V2</h1>

<h2 id="question"></h2>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">
Next
</button>

</div>

<script>

const quiz = [

{
question:"Who directed RRR?",
options:["Rajamouli","Sukumar","Trivikram","Puri Jagannadh"],
answer:"Rajamouli"
},

{
question:"Who played Pushpa Raj?",
options:["Allu Arjun","Nani","Prabhas","Ram Charan"],
answer:"Allu Arjun"
},

{
question:"Who directed Pushpa?",
options:["Sukumar","Rajamouli","Boyapati","Trivikram"],
answer:"Sukumar"
}

];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

let q = quiz[currentQuestion];

document.getElementById("question").innerHTML = q.question;

let html = "";

q.options.forEach(option => {

html += `
<button class="option"
onclick="checkAnswer(this,'${option}')">
${option}
</button>
`;

});

document.getElementById("options").innerHTML = html;

document.getElementById("result").innerHTML = "";

document.getElementById("nextBtn").style.display = "none";

}

function checkAnswer(button,selected){

let correct = quiz[currentQuestion].answer;

let buttons = document.querySelectorAll(".option");

buttons.forEach(btn => {

btn.disabled = true;

if(btn.innerText === correct){
btn.classList.add("correct");
}

});

if(selected === correct){

score++;

document.getElementById("result").innerHTML =
"✅ Correct";

}else{

button.classList.add("wrong");

document.getElementById("result").innerHTML =
"❌ Wrong";

}

document.getElementById("nextBtn").style.display =
"inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){

loadQuestion();

}else{

document.querySelector(".container").innerHTML = `
<h1>🎉 Quiz Complete</h1>

<h2>Score: ${score}/${quiz.length}</h2>

telugu-medium.html
Go To Medium
</button>
`;

}

}

loadQuestion();

</script>

</body>
</html>
