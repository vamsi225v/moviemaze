<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telugu Easy V2</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:#222;
padding:30px;
border-radius:12px;
}

.option{
display:block;
width:100%;
padding:12px;
margin:10px 0;
background:#333;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.correct{
background:green !important;
}

.wrong{
background:red !important;
}

#nextBtn{
display:none;
padding:12px 20px;
background:#ffc107;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🟢 Telugu Easy V2</h1>

<h2 id="question"></h2>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">
Next
</button>

</div>

<script>

const quiz = [
{
question:"Who directed RRR?",
options:["Rajamouli","Sukumar","Trivikram","Puri Jagannadh"],
answer:"Rajamouli"
},
{
question:"Who played Pushpa Raj?",
options:["Allu Arjun","Nani","Prabhas","Ram Charan"],
answer:"Allu Arjun"
},
{
question:"Who directed Pushpa?",
options:["Sukumar","Rajamouli","Boyapati","Trivikram"],
answer:"Sukumar"
}
];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

const q = quiz[currentQuestion];

document.getElementById("question").textContent = q.question;

let html = "";

for(let i=0;i<q.options.length;i++){

html += `
<button class="option"
onclick="checkAnswer(this,'${q.options[i]}')">
${q.options[i]}
</button>
`;

}

document.getElementById("options").innerHTML = html;

document.getElementById("result").innerHTML = "";

document.getElementById("nextBtn").style.display = "none";

}

function checkAnswer(button,selected){

const correct = quiz[currentQuestion].answer;

const buttons = document.querySelectorAll(".option");

buttons.forEach(btn=>{
btn.disabled=true;

if(btn.textContent===correct){
btn.classList.add("correct");
}
});

if(selected===correct){
score++;
document.getElementById("result").innerHTML="✅ Correct";
}
else{
button.classList.add("wrong");
document.getElementById("result").innerHTML="❌ Wrong";
}

document.getElementById("nextBtn").style.display="inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){

loadQuestion();

}
else{

document.querySelector(".container").innerHTML = `
<h1>🎉 Quiz Complete</h1>

<h2>Score: ${score}/${quiz.length}</h2>

<br>

telugu-medium.html
🚀 Go To Medium
</a>
`;

}

}

loadQuestion();

</script>

</body>
</html>
