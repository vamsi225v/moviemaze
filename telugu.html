<!DOCTYPE html>
<html>
<head>
<title>Telugu Quiz - MovieMaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#222;
padding:30px;
border-radius:12px;
}

.option{
display:block;
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
font-size:16px;
}

.option:hover{
background:#444;
}

.correct{
background:green !important;
}

.wrong{
background:red !important;
}

.stats{
color:#ffc107;
font-weight:bold;
margin-bottom:20px;
}

#nextBtn{
display:none;
background:#ffc107;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>🟦 Telugu Movie Quiz</h1>

<div class="stats">
<span id="progress"></span>
&nbsp; | &nbsp;
<span id="scoreDisplay"></span>
</div>

<h2 id="question"></h2>

<div id="options"></div>

<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">
Next Question
</button>

</div>

<script>

const quiz = [

{
question:"Who played Pushpa Raj?",
options:["Prabhas","Allu Arjun","Nani","Ram Charan"],
answer:"Allu Arjun"
},

{
question:"Which movie features Amarendra Baahubali?",
options:["Salaar","Pushpa","Baahubali","Eega"],
answer:"Baahubali"
},

{
question:"Who directed RRR?",
options:["Trivikram","Sukumar","Rajamouli","Koratala Siva"],
answer:"Rajamouli"
},

{
question:"Which actor starred in Salaar?",
options:["NTR","Prabhas","Nani","Mahesh Babu"],
answer:"Prabhas"
},

{
question:"Who played Bhanwar Singh Shekhawat in Pushpa?",
options:["Fahadh Faasil","Jagapathi Babu","Sunil","Rao Ramesh"],
answer:"Fahadh Faasil"
}

];

let currentQuestion = 0;
let score = 0;
let answered = false;

function loadQuestion(){

answered = false;

document.getElementById("result").innerHTML = "";

document.getElementById("nextBtn").style.display = "none";

document.getElementById("progress").innerHTML =
`Question ${currentQuestion + 1} of ${quiz.length}`;

document.getElementById("scoreDisplay").innerHTML =
`Score: ${score}`;

let q = quiz[currentQuestion];

document.getElementById("question").innerHTML =
q.question;

let html = "";

q.options.forEach(option => {

html += `
<button class="option"
onclick="checkAnswer(this,'${option}')">
${option}
</button>
`;

});

document.getElementById("options").innerHTML = html;

}

function checkAnswer(button, selected){

if(answered) return;

answered = true;

let correct = quiz[currentQuestion].answer;

let buttons =
document.querySelectorAll(".option");

buttons.forEach(btn => {

btn.disabled = true;

if(btn.innerText === correct){
btn.classList.add("correct");
}

});

if(selected === correct){

score++;

button.classList.add("correct");

document.getElementById("result").innerHTML =
"✅ Correct!";

}else{

button.classList.add("wrong");

document.getElementById("result").innerHTML =
"❌ Wrong! Correct answer: " + correct;

}

document.getElementById("scoreDisplay").innerHTML =
`Score: ${score}`;

document.getElementById("nextBtn").style.display =
"inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion < quiz.length){

loadQuestion();

}else{

let rank = "🍿 Movie Beginner";

if(score >= 3){
rank = "🌟 Movie Expert";
}

if(score === 5){
rank = "🏆 Movie Master";
}

document.querySelector(".container").innerHTML =
`
<h1>🎉 Telugu Quiz Completed</h1>
<h2>Your Score: ${score}/${quiz.length}</h2>
<h3>${rank}</h3>
<br>
<button onclick="location.reload()">
Play Again
</button>
`;

}

}

loadQuestion();

</script>

</body>
</html>
